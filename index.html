
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suit Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #000;
}

/* HEADER */
.header {
  background: #000;
  color: #fff;
  padding: 15px 30px;
  font-size: 20px;
  font-weight: bold;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  padding: 30px;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

/* IMAGE */
.img-box {
  height: 300px;
  overflow: hidden;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}
<h3 class="title">Classic Suit</h3>
<div class="price">$129</div>

<div class="colors">
  <span class="color active" data-img="black.jpg" style="background:black"></span>
  <span class="color" data-img="gray.jpg" style="background:gray"></span>
  <span class="color" data-img="navy.jpg" style="background:navy"></span>
  <span class="more">+2</span>
</div>
.card:hover img {
  transform: scale(1.08);
}

/* INFO */
.info {
  padding: 15px;
  text-align: center;
}

.title {
  font-size: 18px;
  margin: 5px 0;
}

.desc {
  font-size: 13px;
  color: #777;
}

/* COLORS */
.colors {
  margin: 10px 0;
}

.dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: inline-block;
  margin: 5px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.2s;
}

.dot:hover {
  transform: scale(1.3);
}

.dot.active {
  border: 2px solid #000;
}

/* BOTTOM */
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.price {
  font-size: 18px;
  font-weight: bold;
}

.buy {
  padding: 8px 14px;
  border: none;
  border-radius: 10px;
  background: #00c853;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.buy:hover {
  background: #00a844;
}

/* CART */
.cart {
  position: fixed;
  top: 15px;
  right: 20px;
  background: #00c853;
  color: #fff;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Suit Store</div>
<div class="cart">Cart: <span id="cartCount">0</span></div>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <div class="img-box">
      <img src="black.jpg">
    </div>

    <div class="info">
      <div class="title">Classic Suit</div>
      <div class="desc">Slim fit • Elegant</div>

      <div class="colors">
        <span class="dot active" data-img="black.jpg" style="background:black"></span>
        <span class="dot" data-img="gray.jpg" style="background:gray"></span>
        <span class="dot" data-img="navy.jpg" style="background:navy"></span>
      </div>

      <div class="bottom">
        <span class="price">$129</span>
        <button class="buy">Buy</button>
      </div>
    </div>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <div class="img-box">
      <img src="gray.jpg">
    </div>

    <div class="info">
      <div class="title">Business Suit</div>
      <div class="desc">Office style</div>

      <div class="colors">
        <span class="dot active" data-img="gray.jpg" style="background:gray"></span>
        <span class="dot" data-img="black.jpg" style="background:black"></span>
      </div>

      <div class="bottom">
        <span class="price">$149</span>
        <button class="buy">Buy</button>
      </div>
    </div>
  </div>

</div>

<script>
/* смена цвета */
document.querySelectorAll(".card").forEach(card => {
  const img = card.querySelector("img");
  const dots = card.querySelectorAll(".dot");

  dots.forEach(dot => {
    dot.addEventListener("click", () => {
      img.style.opacity = 0;

      setTimeout(() => {
        img.src = dot.dataset.img;
        img.style.opacity = 1;
      }, 150);

      dots.forEach(d => d.classList.remove("active"));
      dot.classList.add("active");
    });
  });
});

/* корзина */
let count = 0;
const cart = document.getElementById("cartCount");

document.querySelectorAll(".buy").forEach(btn => {
  btn.addEventListener("click", () => {
    count++;
    cart.textContent = count;
  });
});
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мужские костюмы Klaipėda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* HERO */

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
width:120%;
height:120%;
background-image:url("https://images.unsplash.com/photo-1593030761757-71fae45fa0e7");
background-size:cover;
background-position:center;
filter:brightness(0.35);
animation:moveBg 25s infinite alternate;
}

@keyframes moveBg{
0%{transform:scale(1) translateX(0);}
100%{transform:scale(1.2) translateX(-80px);}
}

header *{
position:relative;
z-index:2;
}

h1{
font-size:50px;
margin-bottom:15px;
}

p{
opacity:0.8;
font-size:20px;
}

button{
margin-top:30px;
padding:16px 40px;
font-size:18px;
border:none;
border-radius:40px;
background:#25D366;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 35px rgba(0,255,100,0.6);
}

button:hover{
transform:scale(1.08);
}

/* gallery */

section{
padding:90px 20px;
text-align:center;
}

.gallery{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
overflow:hidden;
border-radius:15px;
transition:0.4s;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 20px 50px rgba(0,255,100,0.4);
}

/* form */

.form{
max-width:450px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:16px;
border-radius:10px;
border:none;
font-size:16px;
}

footer{
padding:40px;
text-align:center;
opacity:0.6;
}

/* WHATSAPP BUTTON */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
padding:16px 22px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* popup */

.popup{
position:fixed;
bottom:100px;
right:25px;
background:#1a1a1a;
padding:20px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
display:none;
max-width:260px;
}

.popup a{
display:inline-block;
margin-top:10px;
background:#25D366;
color:white;
padding:10px 20px;
border-radius:20px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<h1>Мужские костюмы в Клайпеде</h1>

<p>Идеально для свадьбы, бизнеса и особых событий</p>

<button onclick="scrollToForm()">Записаться на примерку</button>

</header>

<section>

<h2>Коллекция костюмов</h2>

<div class="gallery">

<div class="card">
<img src="https://images.unsplash.com/photo-1594938298603-c8148c4dae35">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1593030103066-0093718efeb9">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922284-4b8f1c03b7f6">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7">
</div>

</div>

</section>

<section id="form">

<h2>Записаться на примерку</h2>

<div class="form">

<input placeholder="Ваше имя">
<input placeholder="Телефон">
<input type="date">

</div>

</section>

<footer>
Gentleman Suits Klaipėda
</footer>

<!-- WhatsApp popup -->

<div class="popup" id="popup">

<p>Здравствуйте 👋  
Нужна помощь с выбором костюма?</p>

<a href="https://wa.me/37060000000?text=Здравствуйте%20хочу%20примерить%20костюм">
Написать в WhatsApp
</a>

</div>

<!-- floating whatsapp -->

<a class="whatsapp"
href="https://wa.me/37060000000?text=Здравствуйте%20хочу%20примерить%20костюм">
WhatsApp
</a>

<script>

function scrollToForm(){
document.getElementById("form").scrollIntoView({
behavior:"smooth"
})
}

setTimeout(()=>{
document.getElementById("popup").style.display="block"
},6000)

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: #111;
}

/* главный экран */
.hero {
  height: 100vh;
  background: url("grandis.jpg") no-repeat center;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

/* затемнение */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* контент */
.hero-content {
  position: relative;
}

h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

p {
  opacity: 0.8;
}

/* кнопка */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 30px;
  background: #2AABEE;
  color: white;
  border-radius: 30px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* блоки */
.section {
  padding: 60px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 20px;
}

/* карточки */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  width: 250px;
}

/* адаптация */
@media (max-width: 600px) {
  h1 {
    font-size: 26px;
  }
}
</style>

</head>

<body>

<!-- главный экран -->
<div class="hero">
  <div class="hero-content">
    <h1>Поездки в Варшаву</h1>
    <p>Клайпеда → Варшава → обратно</p>
    <a href="https://t.me/yourusername" class="btn">Написать в Telegram</a>
  </div>
</div>

<!-- расписание -->
<div class="section">
  <h2>Ближайшие поездки</h2>
  <div class="cards">
    <div class="card">Вторник — Клайпеда → Варшава</div>
    <div class="card">Пятница — Варшава → Клайпеда</div>
  </div>
</div>

<!-- преимущества -->
<div class="section">
  <h2>Почему выбирают нас</h2>
  <div class="cards">
    <div class="card">⚡ Быстро и напрямую</div>
    <div class="card">🚗 Комфортный автомобиль</div>
    <div class="card">📄 Помощь с документами</div>
  </div>
</div>

<!-- контакты -->
<div class="section">
  <h2>Контакты</h2>
  <p>📞 +370 619 10045</p>
  <p>📍 Клайпеда</p>
</div>

</body>
</html>

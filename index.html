
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
}

/* ФОН */

.bg {
    background:url("grandis.jpg") no-repeat center center;
    background-size:cover;
    height:100vh;
}
background-repeat:no-repeat;
background-size:cover;

height:100vh;
position:relative;
}

/* затемнение */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* номер */

.phone{
margin-bottom:20px;
padding:12px 25px;
border-radius:30px;
background:rgba(255,255,255,0.1);
font-size:18px;
font-weight:bold;
}

/* текст */

h1{
font-size:32px;
margin:10px 0;
}

p{
color:#ddd;
margin:5px 0;
}

/* срочность */

.urgent{
color:#ff3b3b;
margin-top:10px;
font-weight:bold;
}

/* кнопка */

.button {
    margin-top:40px;
    padding:16px 32px;
    border-radius:30px;
    font-size:16px;
}
border:none;
border-radius:30px;
background:#229ED9;
color:white;
font-size:18px;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* низ */

.features{
position:absolute;
bottom:20px;
display:flex;
gap:20px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="bg">

<div class="overlay">

<div class="phone">📞 +370 619 10045</div>

<h1>Поездки в Варшаву<br>на загранпаспорт</h1>

<p>Клайпеда → Варшава → обратно</p>
    
<p>Mitsubishi Grandis — комфортная поездка</p>

<p class="urgent">Ближайшая поездка скоро — уточняйте места</p>

<a href="https://t.me/USERNAME" target="_blank" class="btn">
    
    
✈️ Написать в Telegram
    
</a>

</div>

<div class="features">
<span>❄️ Кондиционер</span>
<span>🪑 Удобные места</span>
<span>⏱ Быстро</span>
</div>

</div>

</body>
</html>

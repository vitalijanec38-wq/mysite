
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0b0f14;
  color: white;
}

/* ФОН */
.hero {
  height: 100vh;
  background: url('grandis.jpg') center/cover no-repeat;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* затемнение как у "рыбного сайта" */
.hero::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
  top: 0;
  left: 0;
}

/* контент */
.content {
  position: relative;
  text-align: center;
  z-index: 2;
  max-width: 600px;
}

h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

p {
  opacity: 0.8;
  margin-bottom: 30px;
}

/* кнопка */
.btn {
  display: inline-block;
  padding: 15px 30px;
  background: #00bfff;
  color: white;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #009acd;
}

/* блок */
.section {
  padding: 60px 20px;
  text-align: center;
}

.card {
  margin: 10px auto;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  max-width: 300px;
}
</style>

</head>
<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div class="hero">
  <div class="content">
    <h1>Поездки в Варшаву</h1>
    <p>Клайпеда → Варшава → обратно</p>
    <a href="https://t.me/" class="btn">Написать в Telegram</a>
  </div>
</div>

<!-- РАСПИСАНИЕ -->
<div class="section">
  <h2>Ближайшие поездки</h2>
  <div class="card">Пятница — Клайпеда → Варшава</div>
</div>

<!-- ПЛЮСЫ -->
<div class="section">
  <h2>Почему выбирают нас</h2>
  <div class="card">⚡ Быстро и без пересадок</div>
  <div class="card">🚗 Комфортный автомобиль</div>
  <div class="card">⏱ Чёткое время выезда</div>
</div>

<!-- КОНТАКТ -->
<div class="section">
  <h2>Контакты</h2>
  <p>📞 +370 XXX XXXXX</p>
</div>

</body>
</html>

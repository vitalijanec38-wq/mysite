
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('car.jpg') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

p {
  opacity: 0.8;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 30px;
  background: #00c2ff;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #009ed1;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  background: #111;
  padding: 15px 25px;
  border-radius: 20px;
  opacity: 0.9;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 30px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<section class="hero">
  <div class="hero-content">
    <h1>Поездки в Варшаву</h1>
    <p>Клайпеда → Варшава → обратно</p>

 

    <a href="https://t.me/ТВОЯ_ССЫЛКА" target="_blank" class="btn">
      Забронировать в Telegram
    </a>
  </div>
</section>

<!-- БЛИЖАЙШИЕ ПОЕЗДКИ -->
<section class="section">
  <h2>Ближайшие поездки</h2>
  <div class="cards">
   
    <div class="card">Пятница —  Клайпеда-Варшава </div>
  </div>
</section>

<!-- ПРИЧИНЫ -->
<section class="section">
  <h2>Почему выбирают нас</h2>
  <div class="cards">
    <div class="card"> Быстро и без пересадок</div>
    <div class="card"> Комфортный автомобиль</div>
    <div class="card"> Чёткое время выезда</div>
  </div>
</section>

<!-- ФУТЕР -->
<div class="footer">
  © 2026 Поездки в Варшаву
</div>

</body>
</html>

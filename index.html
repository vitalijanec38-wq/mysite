
<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Оставить заявку</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{

height:100vh;

background:linear-gradient(135deg,#4facfe,#00f2fe);

display:flex;
justify-content:center;
align-items:center;

}

.container{

background:white;

padding:40px;

border-radius:15px;

width:380px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

text-align:center;

animation:appear 0.6s ease;

}

@keyframes appear{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

font-size:26px;

margin-bottom:10px;

}

h1{

font-size:22px;

margin-bottom:8px;

}

.subtitle{

font-size:14px;

color:#666;

margin-bottom:20px;

}

input,textarea{

width:100%;

padding:12px;

margin-top:10px;

border-radius:8px;

border:1px solid #ddd;

font-size:14px;

transition:0.2s;

}

input:focus,textarea:focus{

outline:none;

border-color:#4facfe;

box-shadow:0 0 5px rgba(79,172,254,0.5);

}

textarea{

resize:none;

height:80px;

}

.file{

margin-top:10px;

font-size:13px;

}

button{

width:100%;

margin-top:15px;

padding:13px;

background:#4facfe;

border:none;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

transition:0.25s;

}

button:hover{

transform:scale(1.03);

background:#2c8dfc;

}

.success{

display:none;

margin-top:15px;

color:green;

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">⚡</div>

<h1>Оставить заявку</h1>

<div class="subtitle">
Мы свяжемся с вами в течение 10 минут
</div>

<form id="form"
action="ТВОЙ_WEBHOOK"
method="post"
enctype="multipart/form-data">

<input
name="name"
placeholder="Ваше имя"
required>

<input
name="phone"
placeholder="Телефон или Telegram"
required>

<textarea
name="text"
placeholder="Ваше сообщение"></textarea>

<input
class="file"
type="file"
name="image">

<button type="submit">
Отправить заявку
</button>

<div class="success" id="success">
✅ Заявка отправлена
</div>

</form>

</div>

<script>

const form = document.getElementById("form")

form.addEventListener("submit",function(){

setTimeout(()=>{

document.getElementById("success").style.display="block"

},500)

})

</script>

</body>

</html>

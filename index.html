
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
}

/* ФОН */

.bg{
background:url("car.jpg") no-repeat center center;
background-size:cover;
height:100vh;
position:relative;
}

/* затемнение */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* текст */

h1{
font-size:36px;
margin-bottom:10px;
}

p{
font-size:18px;
color:#ddd;
margin:5px 0;
}

/* кнопка */

.btn{
margin-top:20px;
padding:16px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#25D366;
color:white;
cursor:pointer;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* срочность */

.urgent{
color:#ff4444;
margin-top:15px;
font-weight:bold;
}

/* маршрут */

.route{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.pointA{
position:absolute;
top:20px;
left:20px;
font-weight:bold;
}

.pointB{
position:absolute;
bottom:20px;
right:20px;
font-weight:bold;
}

.line{
position:absolute;
width:100%;
height:100%;
}

.line line{
stroke:white;
stroke-width:3;
stroke-dasharray:10,10;
}

/* машина */

.car{
position:absolute;
font-size:26px;
animation:moveCar 5s linear infinite;
}

@keyframes moveCar{
0%{
top:10%;
left:10%;
}
100%{
top:85%;
left:85%;
}
}

</style>

</head>

<body>

<div class="bg">

<div class="overlay">

<h1>Поездки в Варшаву на загранпаспорт</h1>

<p>Клайпеда → Варшава → обратно</p>

<p>Mitsubishi Grandis — комфортная поездка</p>

<p class="urgent">Ближайшая поездка скоро — уточняйте места</p>

<a href="https://wa.me/370XXXXXXXXX" target="_blank" class="btn">
Написать в WhatsApp
</a>

</div>

<!-- маршрут -->

<div class="route">

<div class="pointA">A — Klaipėda</div>
<div class="pointB">B — Warsaw</div>

<svg class="line">
  <line x1="10%" y1="10%" x2="90%" y2="90%" />
</svg>

<div class="car">🚗</div>

</div>

</div>

</body>
</html>

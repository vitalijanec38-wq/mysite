<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('car.jpg') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  animation: zoom 10s ease infinite alternate;
}

@keyframes zoom {
  from { background-size: 100%; }
  to { background-size: 110%; }
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
  top: 0;
  left: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
  animation: fadeUp 1.5s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

/* ЛОГО */
.passport-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.95);
  padding: 8px 15px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: #0b3c5d;
  color: gold;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.logo-text span {
  font-size: 11px;
  color: #333;
  display: block;
}

.logo-text strong {
  font-size: 16px;
  color: black;
}

/* ТЕКСТ */
h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

.subtitle {
  opacity: 0.8;
}

.warning {
  color: #ffcc00;
  margin-top: 10px;
  font-weight: bold;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.4;}
  100% {opacity:1;}
}

/* КНОПКА */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 16px 35px;
  background: linear-gradient(45deg, #00c2ff, #007bff);
  color: white;
  text-decoration: none;
  border-radius: 40px;
  font-weight: bold;
  font-size: 18px;
  box-shadow: 0 0 20px #00c2ff;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #00c2ff;
}

/* СЕКЦИИ */
.section {
  padding: 70px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px rgba(0,194,255,0.5);
}

/* ФУТЕР */
.footer {
  text-align: center;
  padding: 30px;
  opacity: 0.5;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">

    <div class="passport-logo">
      <div class="logo-icon">★</div>
      <div class="logo-text">
        <span>ПАСПОРТНЫЙ</span>
        <strong>СЕРВИС</strong>
      </div>
    </div>

    <h1>Поездки в Варшаву</h1>
    <p class="subtitle">Клайпеда → Варшава → обратно</p>

    <p class="warning">🔥 Осталось 3 места</p>

    <a href="https://t.me/ТВОЯ_ССЫЛКА" target="_blank" class="btn">
      Забронировать в Telegram
    </a>

  </div>
</section>

<section class="section">
  <h2>Ближайшие поездки</h2>
  <div class="cards">
    <div class="card">Вторник — Клайпеда → Варшава</div>
    <div class="card">Пятница — Варшава → Клайпеда</div>
  </div>
</section>

<section class="section">
  <h2>Почему выбирают нас</h2>
  <div class="cards">
    <div class="card">⚡ Без пересадок</div>
    <div class="card">🚐 Комфорт</div>
    <div class="card">⏰ Чёткое время</div>
  </div>
</section>

<div class="footer">
  © 2026 Поездки в Варшаву
</div>

</body>
</html>


<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поездки в Варшаву</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    color: white;
    background: black;
}

/* ФОН как у "рыб" */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1581092919535-7146ff6b9f8d') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
}

.hero-content {
    position: relative;
    z-index: 2;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
    margin-bottom: 20px;
}

.btn {
    display: inline-block;
    padding: 15px 30px;
    border-radius: 30px;
    background: url('car') center/cover no repeat:
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* БЛОК КАРТОЧЕК */
.section {
    padding: 60px 20px;
    text-align: center;
}

.grid {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div class="hero">
    <div class="hero-content">
        <h1>Поездки в Варшаву</h1>
        <p>Клайпеда → Варшава → обратно</p>
        <a href="#" class="btn">Написать в Telegram</a>
    </div>
</div>

<!-- ПОЕЗДКИ -->
<div class="section">
    <h2>Ближайшие поездки</h2>
    <div class="grid">
        <div class="card">Вторник — Клайпеда → Варшава</div>
        <div class="card">Пятница — Варшава → Клайпеда</div>
    </div>
</div>

<!-- ПРИЧИНЫ -->
<div class="section">
    <h2>Почему выбирают нас</h2>
    <div class="grid">
        <div class="card">⚡ Быстро и без пересадок</div>
        <div class="card">🚗 Комфортный автомобиль</div>
        <div class="card">⏰ Чёткое время выезда</div>
    </div>
</div>

</body>
</html>


<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Костюмы</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
margin:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#222;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card p{
padding:10px;
}

/* МОДАЛКА */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
}

.modal img{
width:90%;
max-width:400px;
border-radius:10px;
}

.close{
margin-top:20px;
color:white;
font-size:20px;
cursor:pointer;
}

.whatsapp{
margin-top:20px;
padding:15px 25px;
background:#25D366;
border-radius:10px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Выбери свой костюм</h1>

<div class="grid">

<div class="card" onclick="openModal('green')">
<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0?w=800">
<p>Зелёный костюм</p>
</div>

<div class="card" onclick="openModal('blue')">
<img src="https://images.unsplash.com/photo-1610652492500-ded49ceeb378?w=800">
<p>Тёмно-синий костюм</p>
</div>

<div class="card" onclick="openModal('black')">
<img src="https://images.unsplash.com/photo-1617127365659-c47fa864d8bc?w=800">
<p>Чёрный костюм</p>
</div>

<div class="card" onclick="openModal('classic')">
<img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=800">
<p>Классический костюм</p>
</div>

</div>

<!-- МОДАЛКА -->

<div id="modal" class="modal">
<img id="modalImg">
<a id="waLink" class="whatsapp" target="_blank">Написать в WhatsApp</a>
<div class="close" onclick="closeModal()">Закрыть</div>
</div>

<script>

function openModal(type){

let img = document.getElementById("modalImg")
let link = document.getElementById("waLink")

if(type === "green"){
img.src = "https://images.unsplash.com/photo-1593032465175-481ac7f401a0?w=800"
link.href = "https://wa.me/380987352916?text=Хочу%20зелёный%20костюм"
}

if(type === "blue"){
img.src = "https://images.unsplash.com/photo-1610652492500-ded49ceeb378?w=800"
link.href = "https://wa.me/380987352916?text=Хочу%20синий%20костюм"
}

if(type === "black"){
img.src = "https://images.unsplash.com/photo-1617127365659-c47fa864d8bc?w=800"
link.href = "https://wa.me/380987352916?text=Хочу%20чёрный%20костюм"
}

if(type === "classic"){
img.src = "https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=800"
link.href = "https://wa.me/380987352916?text=Хочу%20классический%20костюм"
}

document.getElementById("modal").style.display = "flex"
}

function closeModal(){
document.getElementById("modal").style.display = "none"
}

</script>

</body>
</html>

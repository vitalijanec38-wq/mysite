
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("grandis.jpg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
}

.hero-content {
  position: relative;
  max-width: 600px;
}

h1 {
  font-size: 42px;
  margin: 0;
}

.btn {
  margin-top: 20px;
  padding: 15px 35px;
  border-radius: 30px;
  background: linear-gradient(45deg,#2AABEE,#00c6ff);
  color: white;
  text-decoration: none;
  display: inline-block;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* СЕКЦИИ */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 25px;
  max-width: 1100px;
  margin: auto;
}

/* КАРТОЧКИ */
.card {
  background: #111;
  border-radius: 20px;
  overflow: hidden;
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 20px;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

/* ПЛАВНОЕ ПОЯВЛЕНИЕ */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* ФУТЕР */
.footer {
  text-align: center;
  padding: 40px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Поездки в Варшаву</h1>
    <p>Клайпеда → Варшава → обратно</p>
    <a href="https://t.me/yourusername" class="btn">Написать</a>
  </div>
</div>

<!-- ПОЕЗДКИ -->
<div class="section fade">
  <h2>Ближайшие поездки</h2>

  <div class="grid">

    <div class="card">
      <img src="grandis.jpg">
      <div class="card-content">
        <h3>Вторник</h3>
        <p>Клайпеда → Варшава</p>
      </div>
    </div>

    <div class="card">
      <img src="grandis.jpg">
      <div class="card-content">
        <h3>Пятница</h3>
        <p>Варшава → Клайпеда</p>
      </div>
    </div>

  </div>
</div>

<!-- ПРЕИМУЩЕСТВА -->
<div class="section fade">
  <h2>Почему выбирают нас</h2>

  <div class="grid">
    <div class="card"><div class="card-content">⚡ Быстро и напрямую</div></div>
    <div class="card"><div class="card-content">🚗 Комфортный автомобиль</div></div>
    <div class="card"><div class="card-content">📄 Помощь с документами</div></div>
  </div>
</div>

<!-- КОНТАКТ -->
<div class="section fade">
  <h2>Контакты</h2>
  <p>📞 +370 619 10045</p>
</div>

<div class="footer">
  © 2026 Поездки
</div>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>

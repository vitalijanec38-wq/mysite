



<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victoria Production</title>

<style>
body{
margin:0;
background:#0d0d0d;
color:white;
font-family:Arial, sans-serif;
text-align:center;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
background:radial-gradient(circle at center,#1a0004,#000);
}

.hero h1{
font-size:64px;
letter-spacing:6px;
margin:0;
color:#ff1a3c;
}

.hero p{
opacity:0.6;
margin-top:15px;
}

/* PORTFOLIO */

.portfolio{
display:none;
padding:80px 20px;
animation:fade 0.8s ease forwards;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.gallery{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:40px;
}

.gallery img{
width:300px;
border-radius:18px;
cursor:pointer;
transition:0.4s;
box-shadow:0 25px 60px rgba(0,0,0,0.8);
}

.gallery img:hover{
transform:scale(1.07);
}

/* FULLSCREEN VIEW */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:1000;
}

.viewer img{
max-width:90%;
max-height:85%;
border-radius:20px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
color:white;
}

/* INSTAGRAM */

.insta{
margin-top:70px;
}

.insta h3{
margin-bottom:20px;
font-weight:normal;
}

.insta a{
display:inline-block;
padding:14px 35px;
background:linear-gradient(45deg,#8b0000,#ff1a3c);
color:white;
text-decoration:none;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

.insta a:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="hero" onclick="openPortfolio()">
<h1>ANASTA</h1>
<p>tap to open portfolio</p>
</div>

<div class="portfolio" id="portfolio">

<h2>Portfolio</h2>

<div class="gallery">
<img src="photo1.jpg" onclick="openImage(this.src)">
<img src="photo2.jpg" onclick="openImage(this.src)">
</div>

<div class="insta">
<h3>@anasta.production</h3>
<a href="https://www.instagram.com/anasta.production/" target="_blank">
View Instagram →
</a>
</div>

</div>

<div class="viewer" id="viewer" onclick="closeImage()">
<span class="close">✕</span>
<img id="viewerImg">
</div>

<script>
function openPortfolio(){
document.querySelector('.hero').style.display="none";
document.getElementById('portfolio').style.display="block";
}

function openImage(src){
document.getElementById('viewerImg').src=src;
document.getElementById('viewer').style.display="flex";
}

function closeImage(){
document.getElementById('viewer').style.display="none";
}
</script>

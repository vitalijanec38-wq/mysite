
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

textarea{
resize:none;
height:80px;
}

button{
width:100%;
margin-top:15px;
padding:12px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2c8dfc;
}

</style>
</head>

<body>

<div class="container">

<h2>Оставить заявку</h2>

<form action="ТВОЙ_WEBHOOK" method="post" enctype="multipart/form-data">

<input name="name" placeholder="Ваше имя" required>

<input name="phone" placeholder="Телефон или Telegram" required>

<textarea name="text" placeholder="Ваше сообщение"></textarea>

<input type="file" name="image">

<button type="submit">Отправить заявку</button>

</form>

</div>

</body>
</html>

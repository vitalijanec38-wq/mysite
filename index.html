
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
}

/* ФОН */
.hero {
    height:100vh;
    background: url('grandis.jpg') center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* затемнение */
.hero::before {
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.hero * {
    position:relative;
}

/* номер */
.phone {
    background:rgba(255,255,255,0.1);
    padding:10px 20px;
    border-radius:20px;
    margin-bottom:20px;
}

/* текст */
h1 {
    font-size:28px;
    margin:10px 0;
}

p {
    opacity:0.8;
    margin:5px 0;
}

/* срочно */
.urgent {
    color:#ff3b3b;
    margin-top:10px;
    font-weight:bold;
}

/* КНОПКА TELEGRAM */
.btn {
    margin-top:25px;
    background:#2AABEE;
    color:white;
    padding:15px 30px;
    border-radius:30px;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.05);
}

/* низ */
.features {
    position:absolute;
    bottom:20px;
    display:flex;
    gap:20px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="hero">

    <div class="phone">📞 +380956077016</div>

    <h1>Поездки в Варшаву<br>на загранпаспорт</h1>

    <p>Клайпеда → Варшава → обратно</p>
    <p>Mitsubishi Grandis — комфортная поездка</p>

    <p class="urgent">Ближайшая поездка скоро — уточняйте места</p>

    <a class="btn" href="https://t.me/ТВОЙ_НИК" target="_blank">
        ✈️ Написать в Telegram
    </a>

    <div class="features">
        <span>❄️ Кондиционер</span>
        <span>💺 Удобные места</span>
        <span>⚡ Быстро</span>
    </div>

</div>

</body>
</html>

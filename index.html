
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки в Варшаву</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
}

/* ФОН */

.bg{
background:url("car.jpg") no-repeat center center;
background-size:cover;
height:100vh;
position:relative;
}

/* затемнение */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* текст */

h1{
font-size:34px;
margin-bottom:10px;
}

p{
font-size:18px;
color:#ddd;
margin:5px 0;
}

/* номер */

.phone{
margin-top:15px;
padding:10px 20px;
border-radius:30px;
background:rgba(255,255,255,0.1);
font-weight:bold;
backdrop-filter:blur(5px);
}

/* кнопка */

.btn{
margin-top:20px;
padding:16px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#229ED9;
color:white;
cursor:pointer;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* срочность */

.urgent{
color:#ff4444;
margin-top:15px;
font-weight:bold;
}

/* иконки */

.features{
position:absolute;
bottom:20px;
display:flex;
gap:20px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="bg">

<div class="overlay">

<h1>Поездки в Варшаву на загранпаспорт</h1>

<p>Клайпеда → Варшава → обратно</p>

<p>Mitsubishi Grandis — комфортная поездка</p>

<div class="phone">
📞 +370 619 10045
</div>

<p class="urgent">Ближайшая поездка скоро — уточняйте места</p>

<a href="https://t.me/USERNAME" target="_blank" class="btn">
✈️ Написать в Telegram
</a>

</div>

<div class="features">
<span>❄️ Кондиционер</span>
<span>🪑 Удобные места</span>
<span>⏱ Быстро</span>
</div>

</div>

</body>
</html>


<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поездки Клайпеда — Варшава</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('car.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.65);
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 600px;
}

.hero h1 {
  font-size: 46px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.9;
}

/* КНОПКИ */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 15px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

.telegram {
  background: linear-gradient(45deg,#2AABEE,#0088cc);
}

.whatsapp {
  background: #25D366;
}

.btn:hover {
  transform: scale(1.05);
}

/* СЕКЦИИ */
.section {
  padding: 60px 20px;
  text-align: center;
}

.grid {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  min-width: 250px;
}

/* ФОТО */
.gallery {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.gallery img {
  width: 300px;
  border-radius: 15px;
}

/* ФИКС КНОПКА */
.fixed-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  text-decoration: none;
}
</style>

</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Поездки Клайпеда → Варшава</h1>
    <p>Без пересадок • 6–7 часов • 120€</p>
    
    <a href="https://t.me/USERNAME" class="btn telegram">Telegram</a>
    <a href="https://wa.me/370XXXXXXXX" class="btn whatsapp">WhatsApp</a>
  </div>
</div>

<!-- ФОТО -->


<!-- РАСПИСАНИЕ -->
<div class="section">
  <h2>Ближайшие поездки</h2>
  <div class="grid">
    <div class="card"> Вторник — Клайпеда → Варшава</div>
    <div class="card"> Пятница — Варшава → Клайпеда</div>
  </div>
</div>

<!-- ПЛЮСЫ -->
<div class="section">
  <h2>Почему выбирают нас</h2>
  <div class="grid">
    <div class="card"> Без пересадок</div>
    <div class="card"> Комфортный авто</div>
    <div class="card"> Точное время</div>
  </div>
</div>


<!-- ФИКС КНОПКА -->
<a href="https://wa.me/37063666841" class="fixed-btn">💬</a>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сайт для дочки</title>

<style>
body{
    background:#ffe6f2;
    font-family:Arial;
    text-align:center;
    padding-top:50px;
}

h1{
    color:#ff4da6;
    font-size:40px;
}

button{
    padding:15px 30px;
    font-size:20px;
    background:#ff99cc;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

img{
    margin-top:20px;
    width:300px;
    display:none;
}
</style>
</head>

<body>

<h1>Привет, солнышко 🌸</h1>

<button onclick="show()">Нажми меня</button>

<br>

<img id="pic" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg">

<script>
function show(){
    document.getElementById("pic").style.display="block";
}
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suit Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* КАРТОЧКА */
.product-card {
  width: 300px;
  background: #1a1a1a;
  border-radius: 16px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-5px);
}

/* ФОТО */
.image-wrapper {
  overflow: hidden;
  border-radius: 12px;
}

.image-wrapper img {
  width: 100%;
  transition: 0.3s ease;
}

.product-card:hover img {
  transform: scale(1.05);
}

/* ТЕКСТ */
.title {
  color: white;
  margin: 12px 0 5px;
  font-size: 18px;
}

.price {
  color: #aaa;
  margin-bottom: 10px;
}

/* ЦВЕТА */
.colors {
  margin: 10px 0;
}

.color {
  display: inline-block;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  margin: 5px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.2s;
}

.color:hover {
  transform: scale(1.2);
}

.color.active {
  border: 2px solid white;
}

.more {
  color: #aaa;
  font-size: 12px;
  margin-left: 5px;
}

/* КНОПКА */
.btn {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00c853, #64dd17);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="product-card">
  <div class="image-wrapper">
    <img id="mainImage" src="https://images.unsplash.com/photo-1593032465171-8c38a2c21a45" alt="Suit">
  </div>

  <div class="title">Classic Suit</div>
  <div class="price">$129</div>

  <div class="colors">
    <span class="color active" data-img="https://images.unsplash.com/photo-1593032465171-8c38a2c21a45" style="background:black"></span>
    
    <span class="color" data-img="https://images.unsplash.com/photo-1520975922284-9c8d5c1d2b27" style="background:gray"></span>
    
    <span class="color" data-img="https://images.unsplash.com/photo-1520975922284-9c8d5c1d2b27" style="background:navy"></span>

    <span class="more">+2</span>
  </div>

  <button class="btn">Get this suit</button>
</div>

<script>
const colors = document.querySelectorAll(".color");
const mainImage = document.getElementById("mainImage");

colors.forEach(color => {
  color.addEventListener("click", () => {

    mainImage.style.opacity = 0;

    setTimeout(() => {
      mainImage.src = color.dataset.img;
      mainImage.style.opacity = 1;
    }, 150);

    colors.forEach(c => c.classList.remove("active"));
    color.classList.add("active");
  });
});
</script>

</body>
</html>

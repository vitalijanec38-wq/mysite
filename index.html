
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suit Atelier</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

/* HEADER */

.header{
padding:30px 20px;
}

.header h1{
font-size:42px;
margin:0;
}

.header p{
color:#aaa;
margin-top:10px;
}

.highlight{
color:#25D366;
font-weight:bold;
}

.urgent{
color:#ff4444;
margin-top:10px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card p{
margin:10px 0;
}

.price{
color:#25D366;
font-weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
}

.modal img{
width:90%;
max-width:400px;
border-radius:12px;
}

.btn{
margin-top:20px;
padding:15px 30px;
background:#25D366;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
text-decoration:none;
}

.close{
margin-top:15px;
cursor:pointer;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">
<h1>Look Like a Man</h1>
<p>Perfect suit. Perfect fit.</p>
<p class="highlight">Ready in 24 hours</p>
<p class="urgent">Only a few slots left this week</p>
</div>

<div class="grid">

<div class="card" onclick="openModal('blue')">
<img src="https://images.unsplash.com/photo-1610652492500-ded49ceeb378?w=800">
<p>Тёмно-синий костюм</p>
<p class="price">€120</p>
</div>

<div class="card" onclick="openModal('black')">
<img src="https://images.unsplash.com/photo-1617127365659-c47fa864d8bc?w=800">
<p>Чёрный костюм</p>
<p class="price">€140</p>
</div>

<div class="card" onclick="openModal('classic')">
<img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=800">
<p>Классический костюм</p>
<p class="price">€130</p>
</div>

</div>

<div id="modal" class="modal">
<img id="modalImg">
<a id="waLink" class="btn" target="_blank">Get this suit now</a>
<div class="close" onclick="closeModal()">Закрыть</div>
</div>

<script>

function openModal(type){

let img = document.getElementById("modalImg")
let link = document.getElementById("waLink")

if(type==="blue"){
img.src="https://images.unsplash.com/photo-1610652492500-ded49ceeb378?w=800"
link.href="https://wa.me/370XXXXXXXXX?text=I%20want%20blue%20suit"
}

if(type==="black"){
img.src="https://images.unsplash.com/photo-1617127365659-c47fa864d8bc?w=800"
link.href="https://wa.me/370XXXXXXXXX?text=I%20want%20black%20suit"
}

if(type==="classic"){
img.src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=800"
link.href="https://wa.me/370XXXXXXXXX?text=I%20want%20classic%20suit"
}

document.getElementById("modal").style.display="flex"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>

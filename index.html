<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANASTA</title>

<style>
body{
margin:0;
background:#0a0a0a;
font-family:Georgia, serif;
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
}

.hero h1{
font-size:60px;
color:#ff2a2a;
letter-spacing:5px;
margin:0;
}

.hero p{
opacity:0.6;
margin-top:15px;
}

.portfolio{
display:none;
padding:80px 20px;
animation:fade 1s ease forwards;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.gallery{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:40px;
}

.gallery img{
width:280px;
border-radius:15px;
cursor:pointer;
transition:0.4s;
box-shadow:0 20px 60px rgba(0,0,0,0.8);
}

.gallery img:hover{
transform:scale(1.08);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:80%;
border-radius:15px;
}

.insta{
margin-top:60px;
}

.insta a{
display:inline-block;
padding:14px 30px;
background:#ff2a2a;
color:white;
text-decoration:none;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

.insta a:hover{
background:#cc0000;
}
</style>
</head>

<body>

<div class="hero" onclick="openPortfolio()">
<h1>ANASTA</h1>
<p>tap to open portfolio</p>
</div>

<div class="portfolio" id="portfolio">

<h2>Portfolio</h2>

<div class="gallery">
<img src="photo1.jpg" onclick="openModal(this)">
<img src="photo2.jpg" onclick="openModal(this)">
</div>

<div class="insta">
<h3>@anasta.production</h3>
<a href="https://www.instagram.com/anasta.production/" target="_blank">
View Instagram →
</a>
</div>

</div>

<div class="modal" id="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>
function openPortfolio(){
document.querySelector('.hero').style.display="none";
document.getElementById('portfolio').style.display="block";
}

function openModal(img){
document.getElementById('modal').style.display="flex";
document.getElementById('modalImg').src=img.src;
}

function closeModal(){
document.getElementById('modal').style.display="none";
}
</script>

</body>
</html>

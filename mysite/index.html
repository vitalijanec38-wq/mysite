
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victoria Production</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0a0a0a;
color:white;
text-align:center;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
background:radial-gradient(circle at center,#2a0000,#000);
}

.hero h1{
font-size:70px;
letter-spacing:8px;
margin:0;
color:#ff1a1a;
}

.hero p{
opacity:0.6;
}

/* PORTFOLIO */

.portfolio{
display:none;
padding:80px 20px;
}

.photos{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.photos img{
width:260px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.photos img:hover{
transform:scale(1.05);
}

/* VIEWER */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
}

.viewer img{
max-width:90%;
max-height:90%;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* INSTAGRAM */

.insta{
margin-top:60px;
}

.insta a{
padding:15px 35px;
background:linear-gradient(45deg,#ff0000,#ff3c3c);
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="hero" onclick="openPortfolio()">
<h1>VICTORIA</h1>
<p>tap to open portfolio</p>
</div>

<div class="portfolio" id="portfolio">

<h2>Portfolio</h2>

<div class="photos">
<img src="photo1.jpg" onclick="openPhoto(this)">
<img src="photo2.jpg" onclick="openPhoto(this)">
</div>

<div class="insta">
<h3>@victoria.production</h3>

<a href="https://instagram.com/" target="_blank">
View Instagram →
</a>

</div>

</div>

<div class="viewer" id="viewer" onclick="closePhoto()">
<div class="close">✕</div>
<img id="viewer-img">
</div>

<script>

function openPortfolio(){
document.querySelector(".hero").style.display="none";
document.getElementById("portfolio").style.display="block";
}

function openPhoto(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewer-img").src=img.src;
}

function closePhoto(){
document.getElementById("viewer").style.display="none";
}

</script>

</body>
</html>
